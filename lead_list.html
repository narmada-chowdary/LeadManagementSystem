<h2>Lead Listing</h2>

<table border="1">
<tr>
<th>Name</th>
<th>Phone</th>
<th>Status</th>
<th>Details</th>
</tr>

{% for lead in leads %}
<tr>
<td>{{ lead.name }}</td>
<td>{{ lead.phone }}</td>
<td>{{ lead.status }}</td>
<td>
<a href="/lead/{{ lead.id }}/">View</a>
</td>
</tr>
{% endfor %}

</table>
